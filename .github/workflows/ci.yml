name: Java CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compilar proyecto
        run: mvn clean package

      - name: Ejecutar pruebas
        run: mvn test

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push msvc-autentificacion
        env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mvn clean package -pl msvc-autentificacion -am -DskipTests
          docker build -t $ECR_REGISTRY/msvc-autentificacion:latest ./msvc-autentificacion
          docker push $ECR_REGISTRY/msvc-autentificacion:latest

      - name: Build y push msvc-proyecto
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mvn clean package -pl msvc-proyecto -am -DskipTests
          docker build -t $ECR_REGISTRY/msvc-proyecto:latest ./msvc-proyecto
          docker push $ECR_REGISTRY/msvc-proyecto:latest

      - name: Build y push msvc-recursos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mvn clean package -pl msvc-recursos -am -DskipTests
          docker build -t $ECR_REGISTRY/msvc-recursos:latest ./msvc-recursos
          docker push $ECR_REGISTRY/msvc-recursos:latest

      - name: Build y push msvc-colaboracion
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mvn clean package -pl msvc-colaboracion -am -DskipTests
          docker build -t $ECR_REGISTRY/msvc-colaboracion:latest ./msvc-colaboracion
          docker push $ECR_REGISTRY/msvc-colaboracion:latest