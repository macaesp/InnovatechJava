name: Java CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compilar proyecto
        run: mvn clean package

      - name: Ejecutar pruebas
        run: mvn test

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push msvc-autentificacion
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-autentificacion && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-autentificacion:latest ./msvc-autentificacion
          docker push $ECR_REGISTRY/msvc-autentificacion:latest

      - name: Build y push msvc-proyecto
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-proyecto && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-proyecto:latest ./msvc-proyecto
          docker push $ECR_REGISTRY/msvc-proyecto:latest

      - name: Build y push msvc-recursos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-recursos && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-recursos:latest ./msvc-recursos
          docker push $ECR_REGISTRY/msvc-recursos:latest

      - name: Build y push msvc-colaboracion
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-colaboracion && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-colaboracion:latest ./msvc-colaboracion
          docker push $ECR_REGISTRY/msvc-colaboracion:latest

  deploy:
    name: Desplegar en el clúster de Docker Swarm (EC2)
    needs: build
    runs-on: ubuntu-latest
    # Se ejecuta al hacer push tanto en main como en master
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Preparar directorio de destino en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/innovatech
            sudo chown -R $(whoami):$(whoami) /opt/innovatech

      - name: Copiar docker-compose.yml al nodo manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/innovatech"
          debug: true

      - name: Login en ECR y desplegar el stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Definición estática del entorno AWS de tu Laboratorio
            export AWS_REGION="us-east-1"
            export ACCOUNT_ID="482544634513"
            export ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            echo "Iniciando sesión en ECR: $ECR_REGISTRY"

            # 2. Login usando la identidad nativa de la EC2 (LabRole) hacia sudo docker
            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            cd /opt/innovatech

            # 3. Pulls con variables protegidas para el entorno sudo
            sudo docker pull "$ECR_REGISTRY/msvc-autentificacion:latest"
            sudo docker pull "$ECR_REGISTRY/msvc-proyecto:latest"
            sudo docker pull "$ECR_REGISTRY/msvc-recursos:latest"
            sudo docker pull "$ECR_REGISTRY/msvc-colaboracion:latest"

            # 4. Despliegue del Stack inyectando explícitamente el ECR_REGISTRY en sudo
            sudo env ECR_REGISTRY="$ECR_REGISTRY" docker stack deploy \
              -c docker-compose.yml innovatech --with-registry-auth

            # 5. Diagnóstico final del despliegue
            sudo docker service ls
            sudo docker stack ps innovatech --no-trunc
