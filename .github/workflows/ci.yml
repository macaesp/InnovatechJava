name: Java CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compilar proyecto
        run: mvn clean package

      - name: Ejecutar pruebas
        run: mvn test

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push msvc-autentificacion
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-autentificacion && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-autentificacion:latest ./msvc-autentificacion
          docker push $ECR_REGISTRY/msvc-autentificacion:latest

      - name: Build y push msvc-proyecto
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-proyecto && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-proyecto:latest ./msvc-proyecto
          docker push $ECR_REGISTRY/msvc-proyecto:latest

      - name: Build y push msvc-recursos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-recursos && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-recursos:latest ./msvc-recursos
          docker push $ECR_REGISTRY/msvc-recursos:latest

      - name: Build y push msvc-colaboracion
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd msvc-colaboracion && mvn clean package -DskipTests && cd ..
          docker build -t $ECR_REGISTRY/msvc-colaboracion:latest ./msvc-colaboracion
          docker push $ECR_REGISTRY/msvc-colaboracion:latest

  deploy:
    name: Desplegar en el clúster de Docker Swarm (EC2)
    needs: build
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ${{ needs.build.outputs.ecr_registry }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml al nodo manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/innovatech"

      - name: Login en ECR y desplegar el stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            cd /opt/innovatech

            docker pull "$ECR_REGISTRY/msvc-autentificacion:latest"
            docker pull "$ECR_REGISTRY/msvc-proyecto:latest"
            docker pull "$ECR_REGISTRY/msvc-recursos:latest"
            docker pull "$ECR_REGISTRY/msvc-colaboracion:latest"

            ECR_REGISTRY="$ECR_REGISTRY" docker stack deploy \
              -c docker-compose.yml innovatech --with-registry-auth

            docker service ls
            docker stack ps innovatech --no-trunc