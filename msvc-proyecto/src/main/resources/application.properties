spring.application.name=msvc-proyecto
server.port=8007

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.datasource.url=jdbc:h2:file:./data/msvc_proyecto
spring.datasource.username=${DB_USERNAME:usuario}
spring.datasource.password=${DB_PASSWORD:clave}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Integración con la función serverless de notificaciones (AWS Lambda)
aws.region=${AWS_REGION:us-east-1}
aws.lambda.notificacion-function-name=${LAMBDA_NOTIFICACION_FUNCTION:innovatech-notificacion-proyecto}
aws.lambda.notificacion-habilitada=${LAMBDA_NOTIFICACION_HABILITADA:true}